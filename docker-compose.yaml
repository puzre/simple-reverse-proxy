services:
  traefik-reverse-proxy:
    image: traefik:v3.0
    container_name: traefik-rev-proxy-container
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "50:80"
      - "5050:8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 250M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  quarkus-hello-world-api:
    build:
      context: ./quarkus-hello-world
      dockerfile: src/main/docker/Dockerfile.native
    image: native-quarkus-hello-world-api
    ports:
      - ":8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 250M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quarkus.rule=PathPrefix(`/quarkus`)"
      - "traefik.http.services.quarkus.loadbalancer.server.port=8080"