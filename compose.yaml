services:
  traefik-reverse-proxy:
    image: traefik:v3.0
    container_name: traefik-rev-proxy-container
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "50:80"
      - "5050:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro